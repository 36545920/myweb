server:
  port: 10888
  servlet:
    context-path: /api/v1

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/myweb?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      max-file-size: -1
      max-request-size: -1

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:myweb-jwt-secret-key-change-in-production}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

app:
  storage-path: /mnt/nas/myweb-files/
  upload-tmp-path: /tmp/myweb-uploads/
  email-verification-code-expiration: 300
  avatar-path: /mnt/nas/myweb-files/avatars/
  avatar-max-size: 2097152
  file-server:
    url: http://127.0.0.1:18080
    auth-token: myweb-file-server-secret-token
